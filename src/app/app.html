<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>GymBooking</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header class="app-header">
    <div class="overlay"></div>
    <div class="header-content">
      <h1>BIENVENIDO A GYM FITNESS</h1>
      <p>Cambiando tu vida, una pesa a la vez.</p>
      <a href="#subtitle" class="button">Reservar ahora</a>
    </div>
  </header>
  
  <h2 id="subtitle">¡Reserva tu lugar!</h2>

  <main id="booking-section" class="app-layout">
    <app-booking-list (bookingSelected)="onBookingSelected($event)" />
    <app-booking-detail [booking]="selectedBooking()" />
  </main>
</body>
</html>
